name: Vulkan Tests

on:
  pull_request:
    paths:
      - "XRENGINE/**"
      - "XREngine.UnitTests/**"
      - "XREngine.Data/**"
      - "XREngine.Runtime.Rendering/**"
      - "Build/CommonAssets/Shaders/**"
      - "docs/work/todo/vulkan.md"
      - ".github/workflows/vulkan-tests.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "XRENGINE/**"
      - "XREngine.UnitTests/**"
      - "XREngine.Data/**"
      - "XREngine.Runtime.Rendering/**"
      - "Build/CommonAssets/Shaders/**"
      - "docs/work/todo/vulkan.md"
      - ".github/workflows/vulkan-tests.yml"

jobs:
  vulkan-focused-tests:
    name: Vulkan focused unit tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore XRENGINE.slnx

      - name: Run Vulkan P0/P1 and regression tests
        run: >
          dotnet test XREngine.UnitTests/XREngine.UnitTests.csproj
          --no-restore
          --filter "FullyQualifiedName~VulkanP0ValidationTests|FullyQualifiedName~VulkanP1ValidationTests|FullyQualifiedName~VulkanTodoP2ValidationTests|FullyQualifiedName~VulkanShaderCompilationRegressionTests|FullyQualifiedName~VulkanShaderPreprocessParityTests|FullyQualifiedName~GpuIndirectPhase3PolicyTests|FullyQualifiedName~GpuCullingPipelineTests|FullyQualifiedName~SwapchainContextCoalescingTests"
          --nologo
          -v minimal
