name: Release branch

on:
  push:
    branches:
      - release
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Commit expected at the release branch tip
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

jobs:
  docs:
    name: Build DocFX documentation
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify promoted commit
        if: inputs.expected_sha != ''
        env:
          ACTUAL_SHA: ${{ github.sha }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        shell: pwsh
        run: |
          if ($env:ACTUAL_SHA -ne $env:EXPECTED_SHA) {
            throw "release points to $env:ACTUAL_SHA, expected $env:EXPECTED_SHA."
          }

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build managed and native submodules
        shell: cmd
        run: Tools\Build-Submodules.bat Release AnyCPU

      - name: Build DocFX site
        shell: cmd
        run: Tools\Build-DocFx.bat

      - name: Package DocFX site
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "xrengine-docs-${{ github.sha }}.zip"
          Compress-Archive -Path "docs/docfx/_site/*" -DestinationPath $archive -Force
          "DOCS_ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload DocFX site
        uses: actions/upload-artifact@v4
        with:
          name: xrengine-docs-${{ github.sha }}
          path: ${{ env.DOCS_ARCHIVE }}
          if-no-files-found: error

  package:
    name: Package tagged Windows release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout tagged source and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify tag is reachable from release
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          git fetch origin release:refs/remotes/origin/release
          git merge-base --is-ancestor $env:RELEASE_SHA origin/release
          if ($LASTEXITCODE -ne 0) {
            throw "Tag $env:RELEASE_TAG is not reachable from the release branch."
          }

          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)$') {
            throw "Release tag '$tag' must use semantic version form vMAJOR.MINOR.PATCH with an optional prerelease suffix."
          }

          "RELEASE_VERSION=$($Matches.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build managed and native submodules
        shell: cmd
        run: Tools\Build-Submodules.bat Release AnyCPU

      - name: Publish Windows applications
        shell: pwsh
        run: |
          $publishRoot = Join-Path $env:RUNNER_TEMP "publish"
          $archiveRoot = Join-Path $env:RUNNER_TEMP "release-assets"
          New-Item -ItemType Directory -Path $publishRoot, $archiveRoot -Force | Out-Null

          $projects = [ordered]@{
            "xrengine-editor-win-x64" = "XREngine.Editor/XREngine.Editor.csproj"
            "xrengine-server-win-x64" = "XREngine.Server/XREngine.Server.csproj"
            "xrengine-vrclient-win-x64" = "XREngine.VRClient/XREngine.VRClient.csproj"
          }

          foreach ($name in $projects.Keys) {
            $output = Join-Path $publishRoot $name
            dotnet publish $projects[$name] `
              --configuration Release `
              --runtime win-x64 `
              --self-contained false `
              -p:ContinuousIntegrationBuild=true `
              -p:Version=$env:RELEASE_VERSION `
              -p:PackageVersion=$env:RELEASE_VERSION `
              --output $output

            if ($LASTEXITCODE -ne 0) {
              throw "Publishing $($projects[$name]) failed with exit code $LASTEXITCODE."
            }

            Compress-Archive `
              -Path (Join-Path $output "*") `
              -DestinationPath (Join-Path $archiveRoot "$name.zip") `
              -Force
          }

          "RELEASE_ASSET_ROOT=$archiveRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload packaged applications
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ github.ref_name }}
          path: ${{ env.RELEASE_ASSET_ROOT }}/*.zip
          if-no-files-found: error

  tagged-release:
    name: Publish tagged GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - docs
      - package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download DocFX site
        uses: actions/download-artifact@v4
        with:
          name: xrengine-docs-${{ github.sha }}
          path: artifacts/docs

      - name: Download packaged applications
        uses: actions/download-artifact@v4
        with:
          name: release-binaries-${{ github.ref_name }}
          path: artifacts/applications

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find artifacts -type f -print0)

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY"
          fi
